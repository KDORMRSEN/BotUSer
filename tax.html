<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxation Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 16px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .back-btn:hover {
            background: #444;
        }

        h1 { color: #c8102e; margin-bottom: 25px; font-size: 28px; }
        input { width: 80%; max-width: 350px; padding: 14px; margin: 12px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; }
        input:focus { outline: none; border-color: #c8102e; box-shadow: 0 0 8px rgba(200, 16, 46, 0.3); }
        button { background: #c8102e; color: white; padding: 14px 40px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; margin: 20px 0; }
        button:hover { background: #a00d24; transform: scale(1.05); }
        h2 { margin: 15px 0; padding: 10px; background: #f8f9fa; border-radius: 8px; font-size: 18px; }
        #tax, #netsalary { color: #c8102e; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Menu</a>
        
        <h1>Staff Cambodia Taxation</h1>
        <input name="name" id="name" placeholder="Please put Your name">
        <input name="salary" id="salary" placeholder="Salary">

        <h2 id="h1name"></h2>
        <h2 id="h1salary"></h2>
        <h2 id="tax"></h2>
        <h2 id="netsalary"></h2>

        <button onclick="Calculate()">Calculate</button>
    </div>

    <script>
        function Calculate(){
            let name = document.getElementById("name").value;
            document.getElementById("h1name").innerHTML="Name: " +name;
            let salary= parseFloat(document.getElementById("salary").value);
            document.getElementById("h1salary").innerHTML="Salary: " +salary+ " ៛";
            let tax=0;
            if (salary<=1500000) tax=0;
            else if (salary<=2000000) tax=(salary*0.05)- 75000;
            else if (salary<=8500000) tax=(salary*0.10)- 175000;
            else if (salary<=12500000) tax=(salary*0.15)- 600000;
            else tax=(salary*0.20)- 1225000;
            let netsalary=salary-tax;
            document.getElementById("tax").innerHTML="Tax: "+tax+" ៛";
            document.getElementById("netsalary").innerHTML="Netsalary: "+netsalary+ " ៛";
        }
    </script>
</body>
</html>

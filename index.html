<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambodia Tools</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            text-align: center;
        }

        .header {
            background: linear-gradient(135deg, #c8102e, #e30613);
            color: white;
            padding: 35px 20px;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
        }

        .content {
            padding: 50px 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }

        .btn-tax {
            background: linear-gradient(135deg, #c8102e, #e30613);
        }

        .btn-day {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>🇰🇭 Cambodia Tools</h1>
        </div>
        <div class="content">
            <a href="tax.html" class="btn btn-tax">Staff Taxation Calculator</a>
            <a href="Statement.html" class="btn btn-day">Day Converter (1-7)</a>
        </div>
    </div>
</body>
</html>
